<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Contact</title>

        <style>
            :root {
                --glass: rgba(255, 255, 255, .14);
                --text: #fff;
                --radius: 22px;
            }

            @media(prefers-color-scheme:light) {
                :root {
                    --glass: rgba(255, 255, 255, .75);
                    --text: #111;
                }
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
            }

            body {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text);
                background: linear-gradient(-45deg, #2563eb, #9333ea, #06b6d4, #3b82f6);
                background-size: 400% 400%;
                animation: bg 14s ease infinite;
            }

            @keyframes bg {
                0% {
                    background-position: 0% 50%
                }

                50% {
                    background-position: 100% 50%
                }

                100% {
                    background-position: 0% 50%
                }
            }

            .card {
                width: 100%;
                max-width: 380px;
                padding: 26px;
                border-radius: var(--radius);
                background: var(--glass);
                backdrop-filter: blur(22px);
                box-shadow: 0 30px 60px rgba(0, 0, 0, .35);
                text-align: center;
            }

            .logo img {
                width: 90px;
                margin-bottom: 14px;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
                font-weight: 600;
            }

            .buttons {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                padding: 14px;
                border-radius: 14px;
                text-decoration: none;
                font-weight: 600;
                color: white;
                transition: .2s;
                box-shadow: 0 8px 0 rgba(0, 0, 0, .25);
            }

            .btn:hover {
                transform: translateY(-2px);
            }

            .btn:active {
                transform: translateY(5px);
                box-shadow: 0 3px 0 rgba(0, 0, 0, .25);
            }

            .btn svg {
                width: 20px;
                height: 20px;
                stroke: white;
            }

            .call {
                background: #22c55e
            }

            .wa {
                background: #25D366
            }

            .map {
                background: #3b82f6
            }

            .save {
                background: #f59e0b
            }

            .share {
                background: #8b5cf6
            }

            .qr-wrap {
                margin-top: 22px;
                padding: 14px;
                border-radius: 18px;
                background: rgba(255, 255, 255, .18);
                display: inline-block;
            }

            .qr-wrap img {
                width: 170px;
                border-radius: 12px;
            }

            .close {
                margin-top: 18px;
                padding: 10px 14px;
                border: none;
                border-radius: 10px;
                background: #ef4444;
                color: white;
                cursor: pointer;
            }

            footer {
                margin-top: 14px;
                font-size: 12px;
                opacity: .8;
            }
        </style>
    </head>

    <body>

        <div class="card">

            <div class="logo">
                <img src="">
            </div>

            <h1>Sree Maa Boutique</h1>

            <div class="buttons">

                <a class="btn call" href="tel:+919390888582">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2A19.8 19.8 0 0 1 3.1 5.2 2 2 0 0 1 5.1 3h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.7 2.6a2 2 0 0 1-.5 2.1L9.2 10.8a16 16 0 0 0 6 6l1.4-1.4a2 2 0 0 1 2.1-.5c.8.3 1.7.6 2.6.7a2 2 0 0 1 1.7 2z" />
                    </svg>
                    Call
                </a>

                <a class="btn wa" id="waBtn" href="https://wa.me/9390888582?text=Hello">
                    <svg fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12.04 2C6.58 2 2.16 6.42 2.16 11.88c0 1.92.51 3.78 1.49 5.42L2 22l4.84-1.6c1.56.85 3.31 1.3 5.2 1.3 5.46 0 9.88-4.42 9.88-9.88S17.5 2 12.04 2zm0 17.88c-1.6 0-3.17-.42-4.56-1.2l-.33-.2-2.87.95.94-2.8-.21-.34a7.77 7.77 0 01-1.18-4.15c0-4.32 3.52-7.84 7.84-7.84s7.84 3.52 7.84 7.84-3.52 7.74-7.47 7.74zm4.3-5.84c-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1-.37-1.9-1.18-.7-.62-1.18-1.38-1.32-1.62-.14-.24-.02-.37.1-.5.1-.1.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.3-.74-1.78-.2-.48-.4-.42-.54-.42h-.46c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2 0 1.18.86 2.32.98 2.48.12.16 1.68 2.56 4.08 3.6.57.24 1.02.38 1.36.48.57.18 1.08.16 1.48.1.45-.07 1.42-.58 1.62-1.14.2-.56.2-1.04.14-1.14-.06-.1-.22-.16-.46-.28z" />
                    </svg>
                    WhatsApp
                </a>

                <a class="btn map" href="https://maps.app.goo.gl/JA9GZFQSVjfqmr4m9">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M21 10c0 7-9 12-9 12S3 17 3 10a9 9 0 1 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                    Location
                </a>

                <button class="btn save" onclick="saveContact()">Save Contact</button>

                <button class="btn share" onclick="share()">Share</button>

            </div>

            <div class="qr-wrap">
                <img id="qr">
            </div>

            <div><button class="close" onclick="closeTab()">Close</button></div>

            <footer>Developed by <a href="https://webdesign.greatindian.net">GreatIndian</a></footer>

        </div>

        <script>

            /* fullscreen */

            document.documentElement.requestFullscreen?.().catch(() => { });

            /* auto whatsapp */

            setTimeout(() => {
                if (/android|iphone/i.test(navigator.userAgent)) {
                    document.getElementById("waBtn").click();
                }
            }, 1500);

            /* close */

            function closeTab() {
                window.close();
                setTimeout(() => history.length > 1 ? history.back() : location = "about:blank", 200);
            }

            /* share */

            function share() {
                if (navigator.share) {
                    navigator.share({ title: "NAME", url: location.href });
                } else {
                    navigator.clipboard.writeText(location.href);
                    alert("Link copied");
                }
            }

            /* save contact */

            function saveContact() {

                const name = "NAME";
                const phone = "PHONE";

                if (/android/i.test(navigator.userAgent)) {

                    location = "intent://contacts/create?name=" +
                        encodeURIComponent(name) + "&phone=" + phone +
                        "#Intent;scheme=contacts;package=com.android.contacts;end";

                } else {

                    const v = `BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
END:VCARD`;

                    const b = new Blob([v], { type: "text/vcard" });
                    const u = URL.createObjectURL(b);
                    const a = document.createElement("a");
                    a.href = u; a.download = "contact.vcf"; a.click();

                }

            }

            /* QR */

            document.getElementById("qr").src =
                "https://api.qrserver.com/v1/create-qr-code/?size=170x170&margin=10&data=" +
                encodeURIComponent(location.href);

        </script>

    </body>

</html>
