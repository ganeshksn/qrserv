<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
overflow:hidden;
}

.container{
width:100%;
max-width:420px;
padding:30px 20px;
text-align:center;
}

.logo{
margin-bottom:25px;
}

.logo img{
max-width:120px;
width:100%;
height:auto;
}

.buttons{
display:flex;
flex-direction:column;
gap:16px;
margin-top:10px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:16px;
font-size:18px;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:600;
transition:all .25s ease;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.btn svg{
width:22px;
height:22px;
}

.call{
background:linear-gradient(135deg,#22c55e,#16a34a);
}

.whatsapp{
background:linear-gradient(135deg,#25D366,#128C7E);
}

.location{
background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.btn:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:0 14px 30px rgba(0,0,0,0.45);
}

.close-btn{
margin-top:30px;
padding:12px 18px;
border-radius:10px;
background:#ef4444;
color:white;
border:none;
font-size:15px;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
}

.close-btn:hover{
background:#dc2626;
}

footer{
margin-top:25px;
font-size:12px;
opacity:.7;
}

footer a{
color:#93c5fd;
text-decoration:none;
}

@media(max-width:480px){

.container{
padding:25px 16px;
}

.btn{
font-size:17px;
padding:15px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="LOGO_URL" alt="Logo">
</div>

<div class="buttons">

<a class="btn call" href="tel:PHONE_NUMBER">

Call

<a class="btn whatsapp" href="https://wa.me/WHATSAPP_NUMBER">

WhatsApp
</a>

<a class="btn location" href="LOCATION_URL">
<svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 119.5 9 2.5 2.5 0 0112 11.5z"/></svg>
Location
</a>

</div>

<button class="close-btn" onclick="closeTab()">Close</button>

<footer>
Developed by <a href="webdesign.greatindian.net">GreatIndian</a>
</footer>

</div>

<script>

function openFullscreen(){

let el=document.documentElement;

if(el.requestFullscreen){
el.requestFullscreen();
}

}

function closeTab(){

window.open('','_self');
window.close();

}

window.onload=openFullscreen;

</script>

</body>
</html>
